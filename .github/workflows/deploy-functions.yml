name: Deploy Functions

on:
  push:
    branches: [main]
    paths:
      - "apps/functions/**"
      - "firebase.json"
      - ".github/workflows/deploy-functions.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Write functions env
        env:
          LINE_MESSAGING_CHANNEL_ID: ${{ secrets.LINE_MESSAGING_CHANNEL_ID }}
          LINE_MESSAGING_CHANNEL_SECRET: ${{ secrets.LINE_MESSAGING_CHANNEL_SECRET }}
          LINE_MESSAGING_ACCESS_TOKEN: ${{ secrets.LINE_MESSAGING_ACCESS_TOKEN }}
          LINE_LOGIN_CHANNEL_ID: ${{ secrets.LINE_LOGIN_CHANNEL_ID }}
          LINE_LOGIN_CHANNEL_SECRET: ${{ secrets.LINE_LOGIN_CHANNEL_SECRET }}
        run: |
          {
            echo "LINE_MESSAGING_CHANNEL_ID=${LINE_MESSAGING_CHANNEL_ID}"
            echo "LINE_MESSAGING_CHANNEL_SECRET=${LINE_MESSAGING_CHANNEL_SECRET}"
            echo "LINE_MESSAGING_ACCESS_TOKEN=${LINE_MESSAGING_ACCESS_TOKEN}"
            echo "LINE_LOGIN_CHANNEL_ID=${LINE_LOGIN_CHANNEL_ID}"
            echo "LINE_LOGIN_CHANNEL_SECRET=${LINE_LOGIN_CHANNEL_SECRET}"
          } > apps/functions/.env

      - name: Write Firebase service account
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ABTA_MEMBER }}
        run: printenv FIREBASE_SERVICE_ACCOUNT > "$RUNNER_TEMP/firebase-service-account.json"

      - name: Deploy functions
        run: npx firebase deploy --only functions --project abta-member --non-interactive --force
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
