name: Deploy Functions

on:
  push:
    branches: [main]
    paths:
      - "apps/functions/**"
      - "firebase.json"
      - ".github/workflows/deploy-functions.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Write functions env
        env:
          LINE_MESSAGING_CHANNEL_ID: ${{ secrets.LINE_MESSAGING_CHANNEL_ID }}
          LINE_MESSAGING_CHANNEL_SECRET: ${{ secrets.LINE_MESSAGING_CHANNEL_SECRET }}
          LINE_MESSAGING_ACCESS_TOKEN: ${{ secrets.LINE_MESSAGING_ACCESS_TOKEN }}
          LINE_LOGIN_CHANNEL_ID: ${{ secrets.LINE_LOGIN_CHANNEL_ID }}
          LINE_LOGIN_CHANNEL_SECRET: ${{ secrets.LINE_LOGIN_CHANNEL_SECRET }}
          VITE_LIFF_URL: ${{ secrets.VITE_LIFF_URL }}
        run: |
          {
            echo "LINE_MESSAGING_CHANNEL_ID=${LINE_MESSAGING_CHANNEL_ID}"
            echo "LINE_MESSAGING_CHANNEL_SECRET=${LINE_MESSAGING_CHANNEL_SECRET}"
            echo "LINE_MESSAGING_ACCESS_TOKEN=${LINE_MESSAGING_ACCESS_TOKEN}"
            echo "LINE_LOGIN_CHANNEL_ID=${LINE_LOGIN_CHANNEL_ID}"
            echo "LINE_LOGIN_CHANNEL_SECRET=${LINE_LOGIN_CHANNEL_SECRET}"
            echo "VITE_LIFF_URL=${VITE_LIFF_URL}"
            echo "WEB_ORIGIN=https://abta-member.web.app"
          } > apps/functions/.env

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ABTA_MEMBER }}

      - name: Validate service account JSON
        run: node -e "const c=JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT); if(!c.client_email) throw new Error('missing client_email'); console.log('sa:', c.client_email)"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ABTA_MEMBER }}

      - name: Deploy functions
        run: |
          set -o pipefail
          npx firebase deploy --only functions --project abta-member --non-interactive --force 2>&1 | tee deploy.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "::error::firebase deploy failed — $(tail -n 40 deploy.log | tr '\n' ' | ')"
            exit "$status"
          fi
